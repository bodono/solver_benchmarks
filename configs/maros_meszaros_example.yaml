run:
  dataset: maros_meszaros
  output_dir: runs
  include:
    - AUG2D
    - CVXQP1_S
  parallelism: 2
  resume: true
  timeout_seconds: 300

solvers:
  - id: qtqp_qdldl
    solver: qtqp
    settings:
      linear_solver: qdldl

  - id: qtqp_accelerate
    solver: qtqp
    settings:
      linear_solver: accelerate

  - id: scs_default
    solver: scs
    settings:
      eps_abs: 1.0e-4
      eps_rel: 1.0e-4
      max_iters: 100000

  - id: clarabel_default
    solver: clarabel
    settings:
      max_iter: 200
