run:
  output_dir: results
  parallelism: 4
  resume: true
  timeout_seconds: 300
  datasets:
    - id: netlib_feasible
      name: netlib
      dataset_options:
        subset: feasible
    - id: miplib_under_5mb
      name: miplib
      dataset_options:
        max_size_mb: 5.0
    - name: maros_meszaros

solvers:
  - id: qtqp_qdldl
    solver: qtqp
    settings:
      linear_solver: qdldl

  - id: qtqp_accelerate
    solver: qtqp
    settings:
      linear_solver: accelerate
