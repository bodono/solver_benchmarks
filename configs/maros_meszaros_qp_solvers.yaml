run:
  dataset: maros_meszaros
  output_dir: results
  parallelism: 2
  resume: true
  timeout_seconds: 300

solvers:
  - id: osqp_default
    solver: osqp
    settings:
      max_iter: 100000

  - id: scs_default
    solver: scs
    settings:
      max_iters: 100000

  - id: clarabel_default
    solver: clarabel
    settings:
      max_iter: 100

  - id: qtqp_default
    solver: qtqp
    settings:
      max_iter: 100
