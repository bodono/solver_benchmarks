name: Tests

on:
  pull_request:
  push:
    branches:
      - master
      - qtqp
  # GitHub Actions schedules are evaluated in UTC and only from the
  # repository default branch.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,all]"

      - name: Run tests
        run: python -m pytest

      - name: Compile Python sources
        run: python -m compileall -q solver_benchmarks tests problem_classes

      - name: Smoke-test CLI
        run: python -m solver_benchmarks.cli list solvers
